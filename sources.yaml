# ----- ADDED: TAIWAN (all manual-check cards — see notes per entry) -----------
#  Tested 2026-06-02 against the generic scraper. None auto-collect cleanly:
#  the server-rendered ones expose events only via query-string detail URLs
#  (no /event/ path segment, so the anchor filter matches nothing) and use
#  ROC-year / 年月日 dates; the rest are JS-rendered or are past-event archives.
#  All eight are parked as manual-check cards, consistent with GTI/CEIAS/FIIA.

# Server-rendered, but "活動足跡" is a PAST-activity archive and detail links are
# /information?uid=... (no event-path segment); dates are ROC-year (112年11月09日).
- key: indsr
  name: Institute for National Defense and Security Research
  short: INDSR
  enabled: false
  type: research_institute
  region: Indo-Pacific
  country: Taiwan
  city: Taipei
  method: scrape
  url: https://indsr.org.tw/informations?uid=5&year=1&page=1
  events_page: https://indsr.org.tw/informations?uid=5&year=1&page=1

# Server-rendered seminar list, but detail links are /PageDoc?fid=... query
# strings (no event-path segment) so the generic scraper finds no anchors.
- key: nccu_iir
  name: NCCU — Institute of International Relations
  short: NCCU/IIR
  enabled: false
  type: university
  region: Indo-Pacific
  country: Taiwan
  city: Taipei
  method: scrape
  url: https://iir.nccu.edu.tw/PageDoc?fid=7478
  events_page: https://iir.nccu.edu.tw/PageDoc?fid=7478

# JS-rendered SPA — the events page returns an "enable JavaScript" stub to a
