# IISS hard-blocks datacentre IPs (HTTP 403 on the whole domain). It cannot be
# collected from a GitHub Actions runner. Left disabled, but it still appears on
# the dashboard as a manual-check card with a link to its events page.
- key: iiss
  name: International Institute for Strategic Studies
