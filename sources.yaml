# =============================================================================
#  EVENT RADAR — SOURCE CONFIGURATION
# =============================================================================
#  To ADD an institution: copy a block, fill in the fields.
#  To REMOVE one: delete its block (or set  enabled: false  to keep it parked).
#
#  method:  rss     -> generic feed parser, just needs `url`
#           scrape  -> generic scraper (keyed by `key`); handles most event pages
#  type:    university | think_tank | research_institute
#  region:  UK | Nordic | Continental | Indo-Pacific  (free text; used as a filter)
#  country: full country name -> drives the flag emoji (see COUNTRY_FLAG in collector.py)
#  city:    home city -> drives the map pin (see CITY_COORDS in collector.py)
# =============================================================================

- key: ceri
  name: Sciences Po — CERI
  short: CERI
  enabled: true
  type: university
  region: Continental
  country: France
  city: Paris
  method: rss
  url: https://www.sciencespo.fr/ceri/en/events-rss.xml
  events_page: https://www.sciencespo.fr/ceri/en/evenements.html

